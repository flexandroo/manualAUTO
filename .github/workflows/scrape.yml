name: Scrape termojet.com.ua catalog

on:
  schedule:
    # Mondays at 04:00 UTC (~06:00 Kyiv summer)
    - cron: '0 4 * * 1'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: scrape-termojet
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Run scraper
        run: node scripts/scrape-termojet.mjs

      - name: Commit snapshot if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/termojet-catalog.json public/products
          if git diff --cached --quiet; then
            echo "No changes — catalog up to date."
          else
            git commit -m "Update termojet catalog snapshot ($(date -u +%Y-%m-%d))"
            git push
          fi
